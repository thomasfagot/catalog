services:
  app:
    container_name: ${COMPOSE_PROJECT_NAME}_app
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    restart: unless-stopped
    volumes:
      - .:/var/www/html
    ports:
      - "5173:5173"
    logging:
      options:
        max-file: "5"
        max-size: "10m"

  nginx:
    container_name: ${COMPOSE_PROJECT_NAME}_proxy
    image: dhi.io/nginx:1.30-alpine3.23
    restart: unless-stopped
    ports:
      - ${HTTP_PORT:-80}:80
      - ${HTTPS_PORT:-443}:443
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./docker/certs:/etc/nginx/certs
    depends_on:
      - app
    logging:
      options:
        max-file: "5"
        max-size: "10m"

  database:
    container_name: ${COMPOSE_PROJECT_NAME}_database
    image: dhi.io/postgres:18-alpine3.22-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    volumes:
      - db-data:/var/lib/postgresql
    logging:
      options:
        max-file: "5"
        max-size: "10m"

volumes:
  db-data:
